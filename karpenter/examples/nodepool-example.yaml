apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: baseline-example
spec:
  limits:
    cpu: "64"
    memory: 256Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m
  template:
    metadata:
      labels:
        role: karpenter-worker
    spec:
      expireAfter: 720h
      nodeClassRef:
        group: oci.oraclecloud.com
        kind: OCINodeClass
        name: <nodeclass_name>
      requirements:
        - key: kubernetes.io/os
          operator: In
          values:
            - linux
        - key: kubernetes.io/arch
          operator: In
          values:
            - amd64
        - key: karpenter.sh/capacity-type
          operator: In
          values:
            - on-demand
        - key: oci.oraclecloud.com/instance-shape
          operator: In
          values:
            - VM.Standard.E5.Flex
