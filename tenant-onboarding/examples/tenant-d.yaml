tenant:
  id: tenant-d
  name: tenant-d
  namespace: tenant-d

nodeClass:
  create: true
  spec:
    nodeCompartmentId: <node_compartment_ocid>
    shapeConfigs:
      - ocpus: 2
        memoryInGbs: 16
    networkConfig:
      primaryVnicConfig:
        subnetConfig:
          subnetId: <node_subnet_ocid>
    volumeConfig:
      bootVolumeConfig:
        imageConfig:
          imageType: OKEImage
          imageId: <oke_image_ocid>

nodePool:
  limits:
    cpu: "64"
    memory: 256Gi

quota:
  hard:
    requests.cpu: "48"
    requests.memory: 192Gi
    limits.cpu: "64"
    limits.memory: 256Gi
    pods: "400"
