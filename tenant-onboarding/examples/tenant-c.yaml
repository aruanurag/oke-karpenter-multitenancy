tenant:
  id: tenant-c
  name: tenant-c
  namespace: tenant-c

nodeClass:
  create: true
  spec:
    nodeCompartmentId: <node_compartment_ocid>
    shapeConfigs:
      - ocpus: 2
        memoryInGbs: 16
    networkConfig:
      primaryVnicConfig:
        subnetConfig:
          subnetId: <node_subnet_ocid>
    volumeConfig:
      bootVolumeConfig:
        imageConfig:
          imageType: OKEImage
          imageId: <oke_image_ocid>

nodePool:
  limits:
    cpu: "16"
    memory: 64Gi

quota:
  hard:
    requests.cpu: "12"
    requests.memory: 48Gi
    limits.cpu: "16"
    limits.memory: 64Gi
    pods: "120"
