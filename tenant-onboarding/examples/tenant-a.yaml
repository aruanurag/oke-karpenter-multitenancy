tenant:
  id: tenant-a
  name: tenant-a
  namespace: tenant-a

nodeClass:
  create: true
  spec:
    nodeCompartmentId: <node_compartment_ocid>
    shapeConfigs:
      - ocpus: 2
        memoryInGbs: 16
    networkConfig:
      primaryVnicConfig:
        subnetConfig:
          subnetId: <node_subnet_ocid>
    volumeConfig:
      bootVolumeConfig:
        imageConfig:
          imageType: OKEImage
          imageId: <oke_image_ocid>

nodePool:
  limits:
    cpu: "32"
    memory: 128Gi

quota:
  hard:
    requests.cpu: "24"
    requests.memory: 96Gi
    limits.cpu: "32"
    limits.memory: 128Gi
    pods: "200"

sampleServices:
  ui:
    enabled: true
    replicaCount: 2
  integration:
    enabled: true
    replicaCount: 2
