tenant:
  id: tenant-a
  name: tenant-a
  namespace: tenant-a
  labels: {}

nodePool:
  enabled: true
  nameOverride: ""
  nodeClassRef:
    group: oci.oraclecloud.com
    kind: OCINodeClass
    name: shared-general

  limits:
    cpu: "32"
    memory: 128Gi

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 5m

  template:
    expireAfter: 720h
    requirements:
      os:
        - linux
      arch:
        - amd64
      capacityType:
        - on-demand
      instanceTypes: []
      instanceShapes:
        - VM.Standard.E5.Flex

nodeClass:
  # When true, the chart creates an OCINodeClass for this tenant.
  # When false, NodePool references nodePool.nodeClassRef.name.
  create: false
  nameOverride: ""
  # Raw OCINodeClass spec map used only when create=true.
  # Example:
  # spec:
  #   nodeCompartmentId: <node_compartment_ocid>
  #   shapeConfigs:
  #     - ocpus: 2
  #       memoryInGbs: 16
  #   networkConfig:
  #     primaryVnicConfig:
  #       subnetConfig:
  #         subnetId: <node_subnet_ocid>
  #   volumeConfig:
  #     bootVolumeConfig:
  #       imageConfig:
  #         imageType: OKEImage
  #         imageId: <oke_image_ocid>
  spec: {}

isolation:
  enabled: true
  nodeLabelKey: platform.example.com/tenant
  nodeLabelValue: ""
  taint:
    enabled: true
    key: platform.example.com/tenant
    value: ""
    effect: NoSchedule

workloadContract:
  createNamespaceDefaultsConfigMap: true
  nodeSelector: {}
  tolerations: []

quota:
  enabled: true
  hard:
    requests.cpu: "32"
    requests.memory: 128Gi
    limits.cpu: "64"
    limits.memory: 256Gi
    pods: "200"

limitRange:
  enabled: true
  default:
    cpu: "500m"
    memory: 512Mi
  defaultRequest:
    cpu: "250m"
    memory: 256Mi

networkPolicy:
  enabled: false
  defaultDenyIngress: true
  defaultDenyEgress: false

rbac:
  enabled: false
  subjectKind: Group
  subjectName: ""
  roleName: admin

admissionPolicy:
  enabled: false
  # Uses native ValidatingAdmissionPolicy (no Kyverno dependency)
  # Requires cluster support and permissions for cluster-scoped resources.
  failurePolicy: Fail
  enforceNodeSelector: true
  enforceToleration: true

sampleServices:
  ui:
    enabled: false
    replicaCount: 2
    image:
      repository: docker.io/library/nginx
      tag: "1.27"
      pullPolicy: IfNotPresent
    containerPort: 80
    service:
      type: ClusterIP
      port: 80
      targetPort: 80
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  integration:
    enabled: false
    replicaCount: 2
    image:
      repository: docker.io/hashicorp/http-echo
      tag: "1.0.0"
      pullPolicy: IfNotPresent
    args:
      - "-text=integration service is healthy"
      - "-listen=:8080"
    containerPort: 8080
    service:
      type: ClusterIP
      port: 8080
      targetPort: 8080
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
