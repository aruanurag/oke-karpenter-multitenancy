tenant:
  id: tenant-b
  name: tenant-b
  namespace: tenant-b

nodeClass:
  create: true
  spec:
    nodeCompartmentId: <node_compartment_ocid>
    shapeConfigs:
      - ocpus: 2
        memoryInGbs: 16
    networkConfig:
      primaryVnicConfig:
        subnetConfig:
          subnetId: <node_subnet_ocid>
    volumeConfig:
      bootVolumeConfig:
        imageConfig:
          imageType: OKEImage
          imageId: <oke_image_ocid>

nodePool:
  limits:
    cpu: "48"
    memory: 192Gi

quota:
  hard:
    requests.cpu: "36"
    requests.memory: 144Gi
    limits.cpu: "48"
    limits.memory: 192Gi
    pods: "300"
