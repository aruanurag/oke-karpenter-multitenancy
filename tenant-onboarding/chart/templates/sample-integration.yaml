{{- if .Values.sampleServices.integration.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration
  namespace: {{ include "tenant-onboarding.namespace" . }}
  labels:
    app.kubernetes.io/name: integration
    app.kubernetes.io/part-of: tenant-samples
    platform.example.com/tenant: {{ include "tenant-onboarding.tenantId" . | quote }}
spec:
  replicas: {{ .Values.sampleServices.integration.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: integration
  template:
    metadata:
      labels:
        app.kubernetes.io/name: integration
        app.kubernetes.io/part-of: tenant-samples
        platform.example.com/tenant: {{ include "tenant-onboarding.tenantId" . | quote }}
    spec:
{{ include "tenant-onboarding.workloadNodeSelector" . | indent 6 }}
{{ include "tenant-onboarding.workloadTolerations" . | indent 6 }}
      containers:
        - name: integration
          image: "{{ .Values.sampleServices.integration.image.repository }}:{{ .Values.sampleServices.integration.image.tag }}"
          imagePullPolicy: {{ .Values.sampleServices.integration.image.pullPolicy }}
          args:
{{ toYaml .Values.sampleServices.integration.args | indent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.sampleServices.integration.containerPort }}
          resources:
{{ toYaml .Values.sampleServices.integration.resources | indent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: integration
  namespace: {{ include "tenant-onboarding.namespace" . }}
  labels:
    app.kubernetes.io/name: integration
    app.kubernetes.io/part-of: tenant-samples
    platform.example.com/tenant: {{ include "tenant-onboarding.tenantId" . | quote }}
spec:
  type: {{ .Values.sampleServices.integration.service.type }}
  selector:
    app.kubernetes.io/name: integration
  ports:
    - name: http
      port: {{ .Values.sampleServices.integration.service.port }}
      targetPort: {{ .Values.sampleServices.integration.service.targetPort }}
{{- end }}
